<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - LaptopLegends</title>

    <link
      rel="preconnect"
      href="[fonts.googleapis.com](https://fonts.googleapis.com)"
    />
    <link
      rel="preconnect"
      href="[fonts.gstatic.com](https://fonts.gstatic.com)"
      crossorigin
    />
    <link
      href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@500;700&display=swap)"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/general.css" />
    <link rel="stylesheet" href="css/contact.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-container">
        <a href="index.html" class="logo">
          <img src="assets/images/logo.png" alt="LaptopLegends Logo" />
          <span class="logo-text">LaptopLegends</span>
        </a>
        <nav class="main-nav">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="contact-page">
      <h1>Neem contact op</h1>

      <!-- Placeholder voor het formulier - wordt uitgewerkt in deelopdracht 4 -->
      <form class="contact-form">
        <label>Naam</label>
        <input type="text" required />

        <label>Email</label>
        <input type="email" required />

        <label>Bericht</label>
        <textarea required></textarea>

        <button type="submit" class="btn">Verzenden</button>
      </form>
    </main>

    <footer class="site-footer">
      <div class="footer-content">
        <span class="footer-logo">LaptopLegends</span>
        <nav class="footer-links">
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
          <a href="contact.html">Contact</a>
        </nav>
        <p class="footer-copyright">
          © 2024 LaptopLegends. Alle rechten voorbehouden.
        </p>
      </div>
    </footer>

    <script src="js/main.js"></script>
  </body>
</html>
